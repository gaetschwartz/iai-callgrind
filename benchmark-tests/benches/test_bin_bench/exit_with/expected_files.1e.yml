data:
  - group: my_group
    function: bench_exit_with
    id: exit_with
    expected:
      globs:
        - pattern: callgrind.bench_exit_with.exit_with.log.#*
          count: 1
        - pattern: callgrind.bench_exit_with.exit_with.out.#*
          count: 2
      files:
        - callgrind.bench_exit_with.exit_with.log
        - callgrind.bench_exit_with.exit_with.log.old
        - callgrind.bench_exit_with.exit_with.out
        - callgrind.bench_exit_with.exit_with.out.old
        - memcheck.bench_exit_with.exit_with.log
        - memcheck.bench_exit_with.exit_with.log.old
        - summary.json
