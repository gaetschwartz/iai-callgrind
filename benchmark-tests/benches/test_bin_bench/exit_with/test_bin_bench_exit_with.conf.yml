# Test Case: `test_bin_bench_exit_with`
#
# Description:
#   Tests the `ExitWith` configuration for handling expected and unexpected
#   exit codes in benchmarked binaries. Validates that benchmarks pass or fail
#   appropriately based on exit code configuration, and that error files are
#   properly transferred from temp directory on unexpected errors.
#
# Test Steps:
#   1. Run with various `ExitWith` configurations and exit codes
#   2. Verify expected pass/fail behavior for each configuration
#   3. Verify error file handling on unexpected failures
#   4. Run after an error to verify cleanup before next data analysis
#
# Test Inputs:
#   - `ExitWith::Code(0)` - expect exit code 0
#   - `ExitWith::Success` - expect success (exit code 0)
#   - `ExitWith::Code(1)` - expect exit code 1
#   - `ExitWith::Failure` - expect failure (non-zero exit code)
#   - Actual exit codes: 0 or 1
#   - Template-generated test cases with varying combinations
#
# Expected Outcomes:
#   - Exit code 0 when expected exit matches actual exit
#   - Exit code 0 when `ExitWith::Success` and actual exit is 0
#   - Exit code 0 when `ExitWith::Failure` and actual exit is non-zero
#   - Exit code 1 on mismatch between expected and actual exit
#   - Error files transferred from temp directory on unexpected failures
#   - Error files cleaned up after benchmark run, before next data analysis

template: test_bin_bench_exit_with.rs.j2
groups:
  - runs:
      - args: []
        expected:
          files: expected_files.1a.yml
          no_stderr: true
          stdout: expected_stdout.1a
          exit_code: 0
        template_data:
          exit_code: "0"
          exit_with: ExitWith::Code(0)
      - args: []
        expected:
          files: expected_files.1b.yml
          no_stderr: true
          stdout: expected_stdout.1b
          exit_code: 0
        template_data:
          exit_code: "0"
          exit_with: ExitWith::Success
      - args: []
        expected:
          files: expected_files.1b.yml
          no_stderr: true
          stdout: expected_stdout.1c
          exit_code: 0
        template_data:
          exit_code: "1"
          exit_with: ExitWith::Code(1)
      - args: []
        expected:
          files: expected_files.1b.yml
          no_stderr: true
          stdout: expected_stdout.1d
          exit_code: 0
        template_data:
          exit_code: "1"
          exit_with: ExitWith::Failure
      - args: []
        expected:
          files: expected_files.1e.yml
          stderr: expected_stderr.1e
          stdout: expected_stdout.1e
          exit_code: 1
        template_data:
          exit_code: "0"
          exit_with: ExitWith::Failure
      - args: []
        expected:
          files: expected_files.1e.yml
          stderr: expected_stderr.1f
          stdout: expected_stdout.1f
          exit_code: 1
        template_data:
          exit_code: "0"
          exit_with: ExitWith::Code(1)
  - runs:
      # Now, first an error run
      - args: []
        expected:
          files: expected_files.2a.yml
          stderr: expected_stderr.2a
          stdout: expected_stdout.2a
          exit_code: 1
        template_data:
          exit_code: "1"
          exit_with: ExitWith::Success
      # Then a successful run
      - args: []
        expected:
          files: expected_files.2b.yml
          no_stderr: true
          stdout: expected_stdout.2b
          exit_code: 0
        template_data:
          exit_code: "0"
          exit_with: ExitWith::Success
