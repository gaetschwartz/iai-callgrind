# Test Case: `test_bin_bench_parallel_consistency`
#
# Description:
#   Validates that metrics and output remain consistent between serial and
#   parallel execution. Since Valgrind is single-threaded, parallel execution
#   should not affect measurement accuracy.
#
# Test Steps:
#   1. Run without `--parallel` to establish baseline metrics
#   2. Run with `--parallel` and compare metrics (with 10% tolerance)
#   3. Repeat steps 1-2 for `--nocapture` and `--show-intermediate` variants
#
# Test Inputs:
#   - `--parallel` flag for parallel execution
#   - `--truncate-description=no` for consistent output format
#   - `--nocapture` to show captured output
#   - `--show-intermediate` to show intermediate results
#   - `tolerance: 0.1` (10%) for metric comparison
#
# Expected Outcomes:
#   - Metrics match within 10% tolerance between serial and parallel runs
#   - Non-metric output (stdout) matches exactly between runs
#   - No stderr output (clean execution)
#   - Valgrind's single-threaded nature ensures parallel execution doesn't affect metrics
groups:
  - runs:
      - args: ["--truncate-description=no"]
        expected:
          files: expected_files.consistency.1a.yml
          stdout: expected_stdout.consistency.1a
          no_stderr: true
      - args: ["--parallel", "--truncate-description=no"]
        tolerance: 0.1
        expected:
          files: expected_files.consistency.1b.yml
          stdout: expected_stdout.consistency.1b
          no_stderr: true
  - runs:
      - args: ["--nocapture", "--truncate-description=no"]
        expected:
          files: expected_files.consistency.1a.yml
          stdout: expected_stdout.consistency.2a
          no_stderr: true
      - args: ["--nocapture", "--parallel", "--truncate-description=no"]
        tolerance: 0.1
        expected:
          files: expected_files.consistency.1b.yml
          stdout: expected_stdout.consistency.2b
          no_stderr: true
  - runs:
      - args:
          ["--nocapture", "--show-intermediate", "--truncate-description=no"]
        expected:
          files: expected_files.consistency.1a.yml
          stdout: expected_stdout.consistency.3a
          no_stderr: true
      - args:
          [
            "--nocapture",
            "--show-intermediate",
            "--parallel",
            "--truncate-description=no",
          ]
        tolerance: 0.1
        expected:
          files: expected_files.consistency.1b.yml
          stdout: expected_stdout.consistency.3b
          no_stderr: true
