# Test Case: `test_bin_bench_parallel`
#
# Description:
#   Tests parallel execution of benchmarks with the `--parallel` flag and
#   `max_parallel` configuration. Validates that benchmarks execute in parallel
#   when configured, and that `max_parallel` limits are respected.
#
# Test Steps:
#   1. Run with `--parallel=2` and `max_parallel=2` (should succeed)
#   2. Run with `--parallel=2` and `max_parallel=0` (unlimited, should succeed)
#   3. Run with `--parallel=1` and `max_parallel=2` (should fail - serial)
#   4. Run with `--parallel=2` and `max_parallel=1` (should fail - serial)
#
# Test Inputs:
#   - `--parallel=N` flag to enable parallel execution
#   - `__MAX_PARALLEL` environment variable to control max parallelism per group
#   - Groups configured with different `max_parallel` values
#   - `--truncate-description=no` for more consistent output
#
# Expected Outcomes:
#   - Parallel runs succeed, serial runs fail
#   - Runs fail when parallel execution is requested but not allowed by config
#   - Exit code 0 for success, exit code 1 for failure
#   - Expected files and stdout match on success
#   - Error messages reported in stderr on failure

groups:
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  # `max_parallel = 0` means no limit, so this should run in parallel and succeed
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "0"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  - runs:
      - args: ["--parallel=1", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          exit_code: 1
          files: expected_files.parallel.2.yml
          stdout: expected_stdout.parallel.2
          stderr: expected_stderr.parallel.2
  # Disable running in parallel only in the `max_parallel_group` by setting
  # `max_parallel = 1`. The `no_max_parallel` group is still expected to run
  # with --parallel=2.
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "1"
        expected:
          exit_code: 1
          files: expected_files.parallel.3.yml
          stdout: expected_stdout.parallel.3
          stderr: expected_stderr.parallel.2
