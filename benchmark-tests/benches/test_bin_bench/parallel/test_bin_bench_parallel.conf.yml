# Test Description: `test_bin_bench_parallel`
#
# The test is very similar to `test_lib_bench_parallel`. See there for all the
# comments.
#
# A benchmark run in this file is expected to succeed if the benchmarks in the
# same group are executed in parallel. If the benchmarks don't run in parallel
# then `file_exists` will panic.
groups:
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  # `max_parallel = 0` means no limit, so this should run in parallel and succeed
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "0"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  - runs:
      - args: ["--parallel=1", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          exit_code: 1
          files: expected_files.parallel.2.yml
          stdout: expected_stdout.parallel.2
          stderr: expected_stderr.parallel.2
  # Disable running in parallel only in the `max_parallel_group` by setting
  # `max_parallel = 1`. The `no_max_parallel` group is still expected to run
  # with --parallel=2.
  - runs:
      - args: ["--parallel=2", "--truncate-description=no"]
        env:
          __MAX_PARALLEL: "1"
        expected:
          exit_code: 1
          files: expected_files.parallel.3.yml
          stdout: expected_stdout.parallel.3
          stderr: expected_stderr.parallel.2
