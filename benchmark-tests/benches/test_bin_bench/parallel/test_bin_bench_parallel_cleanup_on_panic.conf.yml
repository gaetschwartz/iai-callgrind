# Test Case: `test_bin_bench_parallel_cleanup_on_panic`
#
# Description:
#   Tests cleanup behavior when one benchmark process panics during parallel
#   execution. Similar to error cleanup but tests panic handling instead of
#   normal error exit.
#
# Test Steps:
#   1. Run with `--parallel=2` where first benchmark panics
#   2. Verify second benchmark process is killed before completing
#
# Test Inputs:
#   - `--parallel=2` to run two benchmarks simultaneously
#   - First benchmark panics immediately
#   - Second benchmark would normally wait then print message (but should be killed)
#
# Expected Outcomes:
#   - Exit code 1 (failure from panic)
#   - Second benchmark process terminated (no completion message)
#   - Only panic error output in stderr
#   - All parallel processes cleaned up silently
groups:
  - runs:
      - args: ["--parallel=2"]
        expected:
          exit_code: 1
          stdout: expected_stdout.cleanup_on_panic
          stderr: expected_stderr.cleanup_on_panic
