# Test Case: `test_bin_bench_parallel_threads`
#
# Description:
#   Tests parallel execution consistency with threads running in subprocess.
#   Similar to `test_bin_bench_parallel_consistency` but tests threading
#   variance between serial and parallel runs.
#
# Test Steps:
#   1. Run without `--parallel` to establish baseline metrics
#   2. Run with `--parallel` and compare metrics (with tolerance for thread variance)
#   3. Repeat steps 1-2 for `--nocapture` and `--show-intermediate` variants
#
# Test Inputs:
#   - Benchmarks that spawn threads in subprocess
#   - `--parallel` flag for parallel execution
#   - `tolerance: 10` (high tolerance due to thread metric variance)
#   - `--nocapture` and `--show-intermediate` variants
#
# Expected Outcomes:
#   - Metrics match within tolerance between serial and parallel runs
#   - Tolerance is higher (10) than non-threaded tests due to thread variance
#   - Non-metric output matches exactly between runs
#   - No stderr output (clean execution)
groups:
  - runs:
      - args: []
        expected:
          stdout: expected_stdout.threads.1a
          no_stderr: true
      - args: ["--parallel"]
        tolerance: 10
        expected:
          stdout: expected_stdout.threads.1b
          no_stderr: true
  - runs:
      - args: ["--nocapture"]
        expected:
          stdout: expected_stdout.threads.2a
          no_stderr: true
      - args: ["--nocapture", "--parallel"]
        tolerance: 10
        expected:
          stdout: expected_stdout.threads.2b
          no_stderr: true
  - runs:
      - args: ["--nocapture", "--show-intermediate"]
        expected:
          stdout: expected_stdout.threads.3a
          no_stderr: true
      - args: ["--nocapture", "--show-intermediate", "--parallel"]
        tolerance: 10
        expected:
          stdout: expected_stdout.threads.3b
          no_stderr: true
