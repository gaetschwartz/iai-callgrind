# Test Case: `test_bin_bench_parallel_cleanup_on_error`
#
# Description:
#   Tests cleanup behavior when one benchmark process exits with an error
#   during parallel execution. Validates that all parallel processes are
#   terminated and cleaned up, and only the first error is reported.
#
# Test Steps:
#   1. Run with `--parallel=2` where first benchmark exits with error
#   2. Verify second benchmark (timeout) is killed before completing
#
# Test Inputs:
#   - `--parallel=2` to run two benchmarks simultaneously
#   - First benchmark exits with error immediately
#   - Second benchmark would normally wait then print message (but should be killed)
#
# Expected Outcomes:
#   - Exit code 1 (failure from first benchmark)
#   - Second benchmark process terminated (no completion message)
#   - Only error output from first failing benchmark in stderr
#   - All parallel processes cleaned up silently
groups:
  - runs:
      - args: ["--parallel=2"]
        expected:
          exit_code: 1
          stdout: expected_stdout.cleanup_on_error
          stderr: expected_stderr.cleanup_on_error
