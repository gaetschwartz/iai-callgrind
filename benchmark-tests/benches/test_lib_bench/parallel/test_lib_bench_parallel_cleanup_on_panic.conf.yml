# Test Case: `test_lib_bench_parallel_cleanup_on_panic`
#
# Description:
#   Validates cleanup behavior when a benchmark panics during parallel
#   execution, ensuring other running benchmarks are terminated gracefully.
#
# Test Steps:
#   1. Run two benchmarks in parallel with `--parallel=2 --nocapture`
#   2. One benchmark panics during execution
#   3. Verify the other benchmark is terminated and error messages are captured
#
# Test Inputs:
#   - `--parallel=2` to run benchmarks concurrently
#   - `--nocapture` to see output
#   - One benchmark designed to panic during execution
#
# Expected Outcomes:
#   - Exit code 1 (failure due to panic)
#   - Only error messages from the panicking benchmark are shown
#   - The non-panicking benchmark is terminated by the runner

groups:
  - runs:
      - args: ["--parallel=2", "--nocapture"]
        expected:
          exit_code: 1
          stdout: expected_stdout.cleanup_on_panic
          stderr: expected_stderr.cleanup_on_panic
