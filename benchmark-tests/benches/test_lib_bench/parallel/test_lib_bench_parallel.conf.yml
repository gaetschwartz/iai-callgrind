# Test Description: `test_lib_bench_parallel`
#
# Run each benchmark once without parallel and then with parallel to see if the
# metrics or any output differs.
#
# Expected Result:
#
# The metrics and output should match exactly when run serially and in parallel.
groups:
  - runs:
      - args: []
        expected:
          files: expected_files.1a.yml
          stdout: expected_stdout.1a
          stderr: expected_stderr.empty
      - args: ["--parallel"]
        expected:
          files: expected_files.1b.yml
          stdout: expected_stdout.1b
          stderr: expected_stderr.empty
  - runs:
      - args: ["--nocapture"]
        expected:
          files: expected_files.1a.yml
          stdout: expected_stdout.2a
          stderr: expected_stderr.empty
      - args: ["--nocapture", "--parallel"]
        expected:
          files: expected_files.1b.yml
          stdout: expected_stdout.2b
          stderr: expected_stderr.empty
