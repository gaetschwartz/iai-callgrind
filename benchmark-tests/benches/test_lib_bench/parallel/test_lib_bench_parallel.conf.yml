# Test Case: `test_lib_bench_parallel`
#
# Description:
#   Validates parallel benchmark execution using `--parallel` argument and
#   `max_parallel` group configuration, ensuring benchmarks run concurrently
#   when configured.
#
# Test Steps:
#   1. Run with `--parallel=2` and `__MAX_PARALLEL=2` (should pass: parallel
#      execution allowed)
#   2. Run with `--parallel=2` and `__MAX_PARALLEL=0` (should pass: no limit on
#      parallel)
#   3. Run with `--parallel=1` and `__MAX_PARALLEL=2` (should fail: expected
#      parallel but serial)
#   4. Run with `--parallel=2` and `__MAX_PARALLEL=1` (should fail: group limits
#      parallel to 1)
#
# Test Inputs:
#   - `--parallel=N` CLI argument to set parallel execution count
#   - `__MAX_PARALLEL` environment variable controlling group's `max_parallel`
#     setting
#   - Benchmarks that panic if not run in parallel (using file system as
#     synchronization)
#
# Expected Outcomes:
#   - Runs 1 and 2: Exit code 0, benchmarks execute in parallel successfully
#   - Runs 3 and 4: Exit code 1, panic occurs because benchmarks executed
#     serially
#   - Output files and stdout/stderr match expected fixtures

groups:
  - runs:
      - args: ["--parallel=2"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  # `max_parallel = 0` means no limit, so this should run in parallel and succeed
  - runs:
      - args: ["--parallel=2"]
        env:
          __MAX_PARALLEL: "0"
        expected:
          files: expected_files.parallel.1.yml
          stdout: expected_stdout.parallel.1
          no_stderr: true
  - runs:
      - args: ["--parallel=1"]
        env:
          __MAX_PARALLEL: "2"
        expected:
          exit_code: 1
          files: expected_files.parallel.2.yml
          stdout: expected_stdout.parallel.2
          stderr: expected_stderr.parallel.2
  # Disable running in parallel only in the `max_parallel_group` by setting
  # `max_parallel = 1`. The `no_max_parallel` group is still expected to run
  # with --parallel=2.
  - runs:
      - args: ["--parallel=2"]
        env:
          __MAX_PARALLEL: "1"
        expected:
          exit_code: 1
          files: expected_files.parallel.3.yml
          stdout: expected_stdout.parallel.3
          stderr: expected_stderr.parallel.2
