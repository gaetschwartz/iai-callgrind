# Test Case: `test_lib_bench_parallel_consistency`
#
# Description:
#   Validates that benchmark metrics and output remain consistent when run
#   serially versus in parallel.
#
# Test Steps:
#   1. Run benchmarks without `--parallel`, then with `--parallel=2`
#   2. Run benchmarks with `--nocapture` (no parallel), then with `--nocapture
#      --parallel=2`
#
# Test Inputs:
#   - Groups of benchmarks run both serially and in parallel
#   - `--parallel=2` flag for parallel execution
#   - `--nocapture` flag for output visibility
#
# Expected Outcomes:
#   - Metrics and output files match between serial and parallel runs
#   - No differences in benchmark results due to execution mode
#   - Both runs complete successfully with exit code 0

groups:
  - runs:
      - args: []
        expected:
          files: expected_files.consistency.1a.yml
          stdout: expected_stdout.consistency.1a
          no_stderr: true
      - args: ["--parallel=2"]
        expected:
          files: expected_files.consistency.1b.yml
          stdout: expected_stdout.consistency.1b
          no_stderr: true
  - runs:
      - args: ["--nocapture"]
        expected:
          files: expected_files.consistency.1a.yml
          stdout: expected_stdout.consistency.2a
          no_stderr: true
      - args: ["--nocapture", "--parallel=2"]
        expected:
          files: expected_files.consistency.1b.yml
          stdout: expected_stdout.consistency.2b
          no_stderr: true
