# Test Case: `test_lib_bench_nocapture`
#
# Description:
#   Validates the `--nocapture` flag and its variants for controlling
#   stdout/stderr output capture during benchmark execution.
#
# Test Steps:
#   1. Run with no `--nocapture` (default: output captured)
#   2. Run with `--nocapture=false` (explicit off)
#   3. Run with `--nocapture` (implicit true)
#   4. Run with `--nocapture=true` (explicit on)
#   5. Run with `--nocapture=stdout` (capture only stderr)
#   6. Run with `--nocapture=stderr` (capture only stdout)
#
# Test Inputs:
#   - Benchmarks with setup/teardown functions that print to stdout and stderr -
#     Various `--nocapture` flag variations
#
# Expected Outcomes:
#   - No flag and `--nocapture=false`: Output is captured (not shown inline)
#   - `--nocapture` and `--nocapture=true`: Both stdout and stderr shown inline
#   - `--nocapture=stdout`: Only stdout shown inline, stderr captured
#   - `--nocapture=stderr`: Only stderr shown inline, stdout captured
#   - The correct nocapture footer is shown or absent if --nocapture=false

groups:
  - runs:
      - args: []
        expected:
          stdout: expected_stdout.1
          no_stderr: true
  - runs:
      - args: ["--nocapture=false"]
        expected:
          stdout: expected_stdout.1
          no_stderr: true
  - runs:
      - args: ["--nocapture"]
        expected:
          stdout: expected_stdout.2
          no_stderr: true
  - runs:
      - args: ["--nocapture=true"]
        expected:
          stdout: expected_stdout.2
          no_stderr: true
  - runs:
      - args: ["--nocapture=stdout"]
        expected:
          stdout: expected_stdout.3
          no_stderr: true
  - runs:
      - args: ["--nocapture=stderr"]
        expected:
          stdout: expected_stdout.4
          stderr: expected_stderr.1
