groups:
  - runs:
      - args: []
        expected:
          stdout: expected_stdout.1
          no_stderr: true
  - runs:
      - args: ["--nocapture=false"]
        expected:
          stdout: expected_stdout.1
          no_stderr: true
  - runs:
      - args: ["--nocapture"]
        expected:
          stdout: expected_stdout.2
          no_stderr: true
  - runs:
      - args: ["--nocapture=true"]
        expected:
          stdout: expected_stdout.2
          no_stderr: true
  - runs:
      - args: ["--nocapture=stdout"]
        expected:
          stdout: expected_stdout.3
          no_stderr: true
  - runs:
      - args: ["--nocapture=stderr"]
        expected:
          stdout: expected_stdout.4
          stderr: expected_stderr.1
