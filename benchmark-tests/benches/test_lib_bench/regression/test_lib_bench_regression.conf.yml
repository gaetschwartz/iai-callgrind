# Test Case: `test_lib_bench_regression`
#
# Description:
#   Validates regression detection with soft/hard limits and fail-fast behavior,
#   testing limit configuration via code and CLI arguments.
#
# Test Steps:
#   1. Run with invalid hard limit (float instead of integer) - should error
#   2. Run with regression-enabled config and fail-fast disabled
#   3. Run with regression-enabled config and fail-fast enabled for each tool
#   4. Run with regression limits set via CLI arguments
#
# Test Inputs:
#   - Soft limits at 0% threshold (any change triggers regression)
#   - Hard limits below actual metric values (forces regression)
#   - `--callgrind-limits`, `--cachegrind-limits`, `--dhat-limits` CLI arguments
#   - `--regression-fail-fast` CLI flag
#   - Template-generated test files with varying array sizes to provoke a
#     difference in the metrics
#
# Expected Outcomes:
#   - Invalid limit types produce clear error messages
#   - Exit code 0 when no regression detected
#   - Exit code 3 when regression detected
#   - Fail-fast stops at first regression with an error message; without
#     fail-fast, all regressions are reported
#   - The output contains a hint about the limit type and the limit itself

# spell-checker: ignore readsbytes
template: test_lib_bench_regression.rs.j2
groups:
  # Provoke an error when parsing hard limits using a float instead of integer
  - runs:
      # callgrind
      - args: []
        expected:
          no_stdout: true
          stderr: expected_stderr.callgrind-hard-limit
          exit_code: 1
          no_files: true
        template_data:
          callgrind_hard_limit: 200.0
      # cachegrind
      - args: []
        expected:
          no_stdout: true
          stderr: expected_stderr.cachegrind-hard-limit
          exit_code: 1
          no_files: true
        template_data:
          cachegrind_hard_limit: Limit::Float(500000.0)
      # dhat
      - args: []
        expected:
          no_stdout: true
          stderr: expected_stderr.dhat-hard-limit
          exit_code: 1
          no_files: true
        template_data:
          dhat_hard_limit: 5.0
  # regress all with fail-fast
  - runs:
      - args: []
        expected:
          files: expected_files.1.yml
          stdout: expected_stdout.1
          no_stderr: true
          exit_code: 0
        template_data: {}
      # regress callgrind fail fast
      - args: []
        expected:
          files: expected_files.callgrind-fail-fast.yml
          stdout: expected_stdout.callgrind-fail-fast
          stderr: expected_stderr.callgrind-fail-fast
          exit_code: 3
        template_data:
          callgrind_array_length: 100
          callgrind_fail_fast: true
      # regress cachegrind fail fast
      - args: []
        expected:
          files: expected_files.cachegrind-fail-fast.yml
          stdout: expected_stdout.cachegrind-fail-fast
          stderr: expected_stderr.cachegrind-fail-fast
          exit_code: 3
        template_data:
          cachegrind_array_length: 500
          cachegrind_fail_fast: true
      # regress dhat fail fast
      - args: []
        expected:
          stdout: expected_stdout.dhat-fail-fast
          stderr: expected_stderr.dhat-fail-fast
          exit_code: 3
        template_data:
          dhat_array_length: 5
          dhat_fail_fast: true
  # regress all without fail fast
  - runs:
      - args: []
        expected:
          files: expected_files.1.yml
          stdout: expected_stdout.1
          no_stderr: true
          exit_code: 0
        template_data: {}
      - args: []
        expected:
          files: expected_files.no-fail-fast.yml
          stdout: expected_stdout.no-fail-fast
          stderr: expected_stderr.no-fail-fast
          exit_code: 3
        template_data:
          callgrind_array_length: 100
          cachegrind_array_length: 500
          dhat_array_length: 5
  # regress all with limits set per command-line arguments
  - runs:
      - args: []
        expected:
          files: expected_files.1.yml
          stdout: expected_stdout.1
          no_stderr: true
          exit_code: 0
        template_data: {}
      # Using a different config as in the benchmark with an additional estimated cycles
      - args:
          [
            "--callgrind-limits",
            "totalrw=0.0%",
            "--cachegrind-limits",
            "estimatedcycles=0%",
            "--dhat-limits",
            "readsbytes=0%,totalbytes=16",
          ]
        expected:
          files: expected_files.no-fail-fast.yml
          stdout: expected_stdout.args
          stderr: expected_stderr.args
          exit_code: 3
        template_data:
          callgrind_array_length: 100
          cachegrind_array_length: 500
          dhat_array_length: 5
      - args: ["--regression-fail-fast"]
        expected:
          files: expected_files.args-fail-fast.yml
          stdout: expected_stdout.args.fail-fast
          stderr: expected_stderr.callgrind-fail-fast
          exit_code: 3
        template_data:
          callgrind_array_length: 200
          cachegrind_array_length: 1000
          dhat_array_length: 6
