# Test Case: `test_lib_bench_xtree`
#
# Description:
#   Validates Valgrind's xtree/xleak memory profiling options (`xtree-memory`,
#   `xtree-leak`) and correct file creation with Memcheck, Helgrind, and Massif
#   tools.
#
# Test Steps:
#   1. Run with various xtree configurations (first group: without memory leak)
#   2. Run with xtree options and memory leak to test leak detection and report
#   3. Run with xtree in subprocess to test multi-process handling
#   4. Create two named baselines and run --save-baseline together with
#      --baseline in both directions to verify xtree/xleak files are preserved
#      for both saved baselines.
#
# Test Inputs:
#   - `xtree-memory=full` for memory profiling
#   - `xtree-leak=yes` for leak detection profiling
#   - Combined xtree-memory and xtree-leak options
#   - Benchmarks with and without intentional memory leaks
#   - Subprocess benchmarks that leak memory
#   - Combined --save-baseline/--baseline baseline mode
#
# Expected Outcomes:
#   - xtree/xleak output files are created correctly
#   - Memory leaks are detected and reported
#   - Baseline save/load works with xtree output
#   - Combined --save-baseline/--baseline works with xtree/xleak output files
#     without removing the comparison baseline files.
#
# Test Environment:
#   - Excluded on nightly Rust due to memcheck reporting issues (Rust issue
#     #135608)
#   - Different expected fixtures for Rust versions >= 1.89 and < 1.89

groups:
  # Do not run on nightly due to memcheck reporting possibly lost bytes. Might
  # be this related to https://github.com/rust-lang/rust/issues/135608
  - rust_version: ">=1.89"
    runs:
      - args: []
        expected:
          files: expected_files.1a.>=1.89.yml
      - args: []
        expected:
          files: expected_files.1b.>=1.89.yml
      - args: []
        expected:
          files: expected_files.1b.>=1.89.yml
      - args: ["--save-baseline"]
        expected:
          files: expected_files.1c.>=1.89.yml
      - args: []
        expected:
          files: expected_files.1c.>=1.89.yml
  - rust_version: ">=1.89"
    runs:
      - args: ["--save-baseline"]
        expected:
          files: expected_files.2a.>=1.89.yml
      - args: ["--save-baseline"]
        expected:
          files: expected_files.2a.>=1.89.yml
      - args: ["--load-baseline", "--baseline"]
        expected:
          files: expected_files.2a.>=1.89.yml
      - args: ["--save-baseline=other"]
        expected:
          files: expected_files.2d.>=1.89.yml
      - args: ["--save-baseline=other"]
        expected:
          files: expected_files.2d.>=1.89.yml
  - rust_version: ">=1.89"
    runs:
      - args: ["--save-baseline=foo"]
        expected:
          files: expected_files.3a.>=1.89.yml
      - args: ["--save-baseline=bar"]
        expected:
          files: expected_files.3b.>=1.89.yml
      - args: ["--save-baseline=foo", "--baseline=bar"]
        expected:
          files: expected_files.3b.>=1.89.yml
      - args: ["--save-baseline=foo", "--baseline=bar"]
        expected:
          files: expected_files.3b.>=1.89.yml
      - args: ["--save-baseline=bar", "--baseline=foo"]
        expected:
          files: expected_files.3b.>=1.89.yml
  - rust_version: "<1.89"
    runs:
      - args: []
        expected:
          files: expected_files.1a.yml
      - args: []
        expected:
          files: expected_files.1b.yml
      - args: []
        expected:
          files: expected_files.1b.yml
      - args: ["--save-baseline"]
        expected:
          files: expected_files.1c.yml
      - args: []
        expected:
          files: expected_files.1c.yml
  - rust_version: "<1.89"
    runs:
      - args: ["--save-baseline"]
        expected:
          files: expected_files.2a.yml
      - args: ["--save-baseline"]
        expected:
          files: expected_files.2a.yml
      - args: ["--load-baseline", "--baseline"]
        expected:
          files: expected_files.2a.yml
      - args: ["--save-baseline=other"]
        expected:
          files: expected_files.2d.yml
      - args: ["--save-baseline=other"]
        expected:
          files: expected_files.2d.yml
  - rust_version: "<1.89"
    runs:
      - args: ["--save-baseline=foo"]
        expected:
          files: expected_files.3a.yml
      - args: ["--save-baseline=bar"]
        expected:
          files: expected_files.3b.yml
      - args: ["--save-baseline=foo", "--baseline=bar"]
        expected:
          files: expected_files.3b.yml
      - args: ["--save-baseline=foo", "--baseline=bar"]
        expected:
          files: expected_files.3b.yml
      - args: ["--save-baseline=bar", "--baseline=foo"]
        expected:
          files: expected_files.3b.yml
