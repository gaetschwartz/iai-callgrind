# Test Case: `test_lib_bench_entry_point`
#
# Description:
#   Validates entry point configuration (None, Default, Custom) for controlling
#   which code is measured, and verifies costs are correctly attributed based on
#   the entry point setting.
#
# Test Steps:
#   1. Run all benchmarks, and run the assertions in the group teardown
#
# Test Inputs:
#   - EntryPoint::None: includes all setup costs in measurement
#   - EntryPoint::Default: measures from the benchmark wrapper function
#   - EntryPoint::Custom: measures from a user-specified function name
#
# Expected Outcomes:
#   - EntryPoint::None: Higher instruction count (includes setup/initialization)
#   - EntryPoint::Default: Lower instruction count (benchmark function only)
#   - EntryPoint::Custom: Costs attributed to the specified function only
#   - Group teardown assertions pass, verifying correct cost attribution
#   - Flamegraphs are generated

# TODO: assert files and maybe output
groups:
  - runs:
      - args: ["--nocapture"]
