# Test Case: `test_lib_bench_valgrind_runner`
#
# Description:
#   Tests the `--valgrind-runner` CLI argument and related options for
#   customizing the valgrind execution wrapper, including environment variable
#   interpolation and path substitution.
#
# Preconditions:
#   - Valgrind installed in the PATH
#
# Test Steps:
#   1. Run with `--valgrind-runner` only to verify basic runner invocation and
#      environment variable passing (`GUNGRAUN_VR_*` vars, ...)
#   2. Run with `--valgrind-runner` and `--valgrind-runner-args` to verify:
#      a. Extra arguments are passed to the runner with environment variable
#         interpolation (`${GUNGRAUN_ALLOW_ASLR}` defaults to `no`)
#      b. Interpolation respects CLI arg `--allow-aslr=true` (results in `yes`)
#   3. Run with `--valgrind-runner` and `--valgrind-bin` to verify custom
#      valgrind executable path is passed to runner
#   4. Run with `--valgrind-runner` and `--valgrind-runner-dest` to verify
#      destination path substitution and replacing it with the original
#      value in `GUNGRAUN_VR_DEST_DIR`
#   5. Run with `--valgrind-runner` and `--valgrind-runner-root` to verify
#      workspace root path substitution via `GUNGRAUN_VR_WORKSPACE_ROOT`
#
# Test Inputs:
#   - `--valgrind-runner` pointing to custom bash script wrapper
#   - `--valgrind-runner-args='--just=test --allow-aslr=${GUNGRAUN_ALLOW_ASLR}'`
#     for testing environment variable interpolation in runner args
#   - `--allow-aslr=true` CLI arg to test interpolation with non-default value
#   - `--valgrind-bin=/doesnotexist` for custom valgrind executable path
#   - `--valgrind-runner-dest=/doesnotexist` for destination path substitution
#   - `--valgrind-runner-root=/doesnotexist` for workspace root substitution
#   - Environment variable `__GUNGRAUN_TEST_VAR=test var` for env clearing test
#   - `--env-clear=no` in step 3 to test environment passthrough
#
# Expected Outcomes:
#   - Runner receives valgrind executable path as first argument if
#     --valgrind-runner-args are not set
#   - Environment variables `GUNGRAUN_VR_DEST_DIR`, `GUNGRAUN_VR_HOME`,
#     `GUNGRAUN_VR_WORKSPACE_ROOT`, `GUNGRAUN_ALLOW_ASLR` are available to runner
#   - Extra arguments via `--valgrind-runner-args` are passed before the valgrind path
#   - Environment variable interpolation in `--valgrind-runner-args` works:
#     - Default `GUNGRAUN_ALLOW_ASLR=no` when `--allow-aslr` not specified
#     - `GUNGRAUN_ALLOW_ASLR=yes` when `--allow-aslr=true` specified
#   - Custom valgrind path via `--valgrind-bin` is passed to runner.
#   - `/doesnotexist` paths are substituted with actual paths via environment
#     variables when using `--valgrind-runner-dest` or `--valgrind-runner-root`
#   - Test environment variable is cleared when `env_clear` is true (default)

groups:
  # 1. without extra arguments
  - runs:
      - runs_on: "!x86_64-unknown-freebsd"
        args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--nocapture",
          ]
        envs:
          __GUNGRAUN_TEST_VAR: test var
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with the valgrind executable:"
          printf '%s\n' "$1"

          for env in \
                    "GUNGRAUN_VR_DEST_DIR" \
                    "GUNGRAUN_VR_HOME" \
                    "GUNGRAUN_VR_WORKSPACE_ROOT" \
                    "GUNGRAUN_ALLOW_ASLR"; do
            [[ -n "$env" ]] && echo "Found env: ${env}"
          done

          [[ -z "$__GUNGRAUN_TEST_VAR" ]] && echo "Environment has been cleared"

          exec "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.1
          files: expected_files.1.yml
          no_stderr: true
  # like 1. but on freebsd
  - runs:
      - runs_on: "x86_64-unknown-freebsd"
        args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--nocapture",
          ]
        envs:
          __GUNGRAUN_TEST_VAR: test var
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with the valgrind executable:"
          printf '%s\n' "$1"

          for env in \
                    "GUNGRAUN_VR_DEST_DIR" \
                    "GUNGRAUN_VR_HOME" \
                    "GUNGRAUN_VR_WORKSPACE_ROOT" \
                    "GUNGRAUN_ALLOW_ASLR"; do
            [[ -n "$env" ]] && echo "Found env: ${env}"
          done

          [[ -z "$__GUNGRAUN_TEST_VAR" ]] && echo "Environment has been cleared"

          exec "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.1.freebsd
          files: expected_files.1.yml
          no_stderr: true
  # 2. with extra arguments and interpolation
  - runs:
      # without explicit --allow-aslr
      - args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-runner-args='--just=test --allow-aslr=${GUNGRAUN_ALLOW_ASLR} --'",
            "--nocapture",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with arguments:"
          while [[ $# -gt 0 && "$1" != "--" ]]; do echo "$1"; shift; done
          [[ "$1" == "--" ]] && shift
          exec "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.2a
          files: expected_files.1.yml
          no_stderr: true
      # set --allow-aslr=true
      - args:
          [
            "--allow-aslr=true",
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-runner-args='--just=test --allow-aslr=${GUNGRAUN_ALLOW_ASLR} --'",
            "--nocapture",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with arguments:"
          while [[ $# -gt 0 && "$1" != "--" ]]; do echo "$1"; shift; done
          [[ "$1" == "--" ]] && shift
          exec "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.2b
          files: expected_files.2b.yml
          no_stderr: true
  # 3. with valgrind bin path
  - runs:
      - runs_on: "!x86_64-unknown-freebsd"
        args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-bin=/doesnotexist",
            "--nocapture",
            "--env-clear=no",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with valgrind runner: '$1'"
          [[ "$1" == "/doesnotexist" ]] || { echo "Wrong valgrind runner"; exit 1; }

          shift
          valgrind="$(command -v valgrind)"
          echo "Found valgrind: '${valgrind}'"

          exec "$valgrind" "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.3
          files: expected_files.1.yml
          no_stderr: true
  # like 3. but on freebsd different output for valgrind path
  - runs:
      - runs_on: "x86_64-unknown-freebsd"
        args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-bin=/doesnotexist",
            "--nocapture",
            "--env-clear=no",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          echo "Running with valgrind runner: '$1'"
          [[ "$1" == "/doesnotexist" ]] || { echo "Wrong valgrind runner"; exit 1; }

          shift
          valgrind="$(command -v valgrind)"
          echo "Found valgrind: '${valgrind}'"

          exec "$valgrind" "$@"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.3.freebsd
          files: expected_files.1.yml
          no_stderr: true
  # --valgrind-runner-dest
  - runs:
      - args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-runner-dest=/doesnotexist",
            "--nocapture",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          valgrind="$1"; shift
          runner_args=()
          while [[ $# -gt 0 ]]; do
            if [[ "$1" =~ .*/doesnotexist/.* ]]; then
              echo "$1"
              runner_args+=("${1/\/doesnotexist/${GUNGRAUN_VR_DEST_DIR}}")
            else
              runner_args+=("$1")
            fi
            shift
          done

          exec "$valgrind" "${runner_args[@]}"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.4
          files: expected_files.1.yml
          no_stderr: true
  # --valgrind-runner-root
  - runs:
      - args:
          [
            "--valgrind-runner=/tmp/gungraun_test_lib_bench_valgrind_runner",
            "--valgrind-runner-root=/doesnotexist",
            "--nocapture",
          ]
        setup: |
          cat <<'EOF' >/tmp/gungraun_test_lib_bench_valgrind_runner
          #!/usr/bin/env bash

          valgrind="$1"; shift
          runner_args=()
          while [[ $# -gt 0 ]]; do
            if [[ "$1" =~ .*/doesnotexist/.* ]]; then
              echo "${1/test_lib_bench_valgrind_runner-[0-9a-zA-Z]*/test_lib_bench_valgrind_runner-<__FILTER__>}"
              runner_args+=("${1/\/doesnotexist/${GUNGRAUN_VR_WORKSPACE_ROOT}}")
            else
              runner_args+=("$1")
            fi
            shift
          done

          exec "$valgrind" "${runner_args[@]}"
          EOF

          chmod +x /tmp/gungraun_test_lib_bench_valgrind_runner
        expected:
          stdout: expected_stdout.5
          files: expected_files.1.yml
          no_stderr: true
