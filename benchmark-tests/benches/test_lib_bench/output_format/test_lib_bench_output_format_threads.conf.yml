# Test description: `test_lib_bench_output_format_threads`
#
# Basically the same procedure as in `test_lib_bench_output_format` but with
# tests that spawn threads.
groups:
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--nocapture"]
        expected:
          stdout: expected_stdout.threads.1a
      - args: ["--nocapture"]
        flaky: 3
        tolerance: 0.1
        expected:
          stdout: expected_stdout.threads.1b
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--nosummary"]
        expected:
          stdout: expected_stdout.threads.no_summary
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--callgrind-metrics=ir", "--dhat-metrics=totalbytes,totalunits"]
        expected:
          stdout: expected_stdout.threads.cli-metrics
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--show-grid", "--nocapture"]
        expected:
          stdout: expected_stdout.threads.cli-show-grid
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--show-intermediate", "--nocapture"]
        expected:
          stdout: expected_stdout.threads.cli-show-intermediate
  - runs_on: "!x86_64-unknown-freebsd"
    runs:
      - args: ["--truncate-description", "--nocapture"]
        expected:
          stdout: expected_stdout.threads.cli-truncate-description
  - runs_on: "x86_64-unknown-freebsd"
    runs:
      - args: []
