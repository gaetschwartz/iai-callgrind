# Test Case: `test_lib_bench_threads_nested`
#
# Description:
#   Validates nested thread execution (threads spawning threads) with multiple
#   Valgrind tools, ensuring correct metric collection for complex threading patterns.
#
# Test Steps:
#   1. Run with `--nocapture` multiple times for comparison
#   2. Test `--save-baseline` to capture nested thread results
#   3. Test `--load-baseline` to compare against saved results
#
# Test Inputs:
#   - Thread-in-thread benchmark executing nested threads
#   - Subprocess benchmark with nested thread spawning
#   - Callgrind and DHAT with `EntryPoint::None` for manual instrumentation
#   - `--instr-atstart=no` to control instrumentation timing
#
# Expected Outcomes:
#   - Nested thread execution completes successfully
#   - Output files reflect correct thread structure
#   - Baseline save/load works correctly with nested threads
#
# Test Environment:
#   - Excluded on FreeBSD and nightly Rust
#   - Uses `entry_point(EntryPoint::None)` with manual instrumentation calls

# TODO: Run these tests on nightly toolchain when rust upstream bug in nightly
# is fixed

groups:
  - runs_on: "!x86_64-unknown-freebsd"
    rust_version: "!=nightly"
    runs:
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1a.yml
          stdout: expected_stdout_nested.1a
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1b.yml
      # The third run should produce the exact same files, stdout as the second
      # run
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1b.yml
      # Test all baseline options and verify the multiple files due to the
      # subprocesses and threads
      - args: ["--nocapture", "--save-baseline"]
        expected:
          files: expected_files_nested.1d.yml
      - args: ["--nocapture", "--save-baseline=foo"]
        expected:
          files: expected_files_nested.1e.yml
      - args: ["--nocapture", "--load-baseline=foo", "--baseline"]
        expected:
          files: expected_files_nested.1e.yml
      - args: ["--nocapture", "--save-baseline=foo"]
        expected:
          files: expected_files_nested.1e.yml
  # The tests on freebsd don't verify the stdout since freebsd does not support
  # `--fair-sched=yes` and the differences between two benchmark runs are random
  - runs_on: "x86_64-unknown-freebsd"
    rust_version: "!=nightly"
    runs:
      # The first run does not show any differences because there is no
      # benchmark run to compare to, so the stdout can be verified at least this
      # first time
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1a.yml
          stdout: expected_stdout_nested.freebsd.1a
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1b.yml
      # The third run should produce the exact same files, stdout as the second
      # run
      - args: ["--nocapture"]
        expected:
          files: expected_files_nested.1b.yml
      # Test all baseline options and verify the creation of multiple files due
      # to the subprocesses and threads
      - args: ["--nocapture", "--save-baseline"]
        expected:
          files: expected_files_nested.1d.yml
      - args: ["--nocapture", "--save-baseline=foo"]
        expected:
          files: expected_files_nested.1e.yml
      - args: ["--nocapture", "--load-baseline=foo", "--baseline"]
        expected:
          files: expected_files_nested.1e.yml
      - args: ["--nocapture", "--save-baseline=foo"]
        expected:
          files: expected_files_nested.1e.yml
