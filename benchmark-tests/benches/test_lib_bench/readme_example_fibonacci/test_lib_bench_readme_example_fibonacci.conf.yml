# Test Case: `test_lib_bench_readme_example_fibonacci`
#
# Description:
#   Validates the Fibonacci benchmark example from the README, testing basic
#   benchmark functionality and CLI options like `--home` and
#   `--separate-targets`.
#
# Test Steps:
#   1. Run benchmarks twice (creates baseline for comparison)
#   2. Run with `--separate-targets` to test per-target compilation
#   3. Run with `--home=/tmp/gungraun` to test custom home directory
#
# Test Inputs:
#   - Fibonacci benchmark from README example
#   - `--separate-targets` flag for separate target compilation
#   - `--home` flag for custom output directory
#
# Expected Outcomes:
#   - First run group: Creates baseline files
#   - Second run group: Uses separate targets for x86_64-linux-gnu
#   - Third run group: Uses custom home directory (`/tmp/gungraun`)
#   - All benchmarks complete successfully

# spell-checker:ignore rmdirs

groups:
  - runs:
      - args: []
        expected:
          files: expected_files.1a.yml
      - args: []
        expected:
          files: expected_files.1b.yml
  - runs:
      - args: ["--separate-targets"]
        expected:
          files: expected_files.test_separate_targets_x86_64.2a.yml
        runs_on: "x86_64-unknown-linux-gnu"
      - args: ["--separate-targets"]
        expected:
          files: expected_files.test_separate_targets_x86_64.2b.yml
        runs_on: "x86_64-unknown-linux-gnu"
  - runs:
      - args: ["--home=/tmp/gungraun"]
        expected:
          files: expected_files.test_home.3a.yml
        rmdirs:
          - /tmp/gungraun
      - args: ["--home=/tmp/gungraun"]
        expected:
          files: expected_files.test_home.3b.yml
