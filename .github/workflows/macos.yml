# spell-checker:ignore taiki rustfmt binstall clippy taplo rustup nocapture
# spell-checker:ignore nofile gnuabi armv gnueabi mipsel vmactions usesh proto
# spell-checker:ignore tlsv connrefused copyback toolsdirectory ghcup rustdocflags
# spell-checker:ignore androideabi binutils argjson

name: MacOS checks

on:
  workflow_call:

jobs:
  build_hack:
    name: Build with feature powerset
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Build and install valgrind
        run: |
          brew tap LouisBrunner/valgrind
          brew install --HEAD LouisBrunner/valgrind/valgrind
      - name: Update dependencies
        run: cargo update
      - name: Build
        run: just build-hack

  test:
    name: Run unit and integrations tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: "Prepare: Run cargo update"
        run: cargo update
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: Build and install valgrind
        run: |
          brew tap LouisBrunner/valgrind
          brew install --HEAD LouisBrunner/valgrind/valgrind
      - name: Build all tests with the feature powerset
        run: just build-tests-hack
      - name: Run the tests
        run: cargo test --workspace --exclude client-request-tests

  test_system:
    name: Run system tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - filter: "test_bin_bench_*"
            partition: "1/2"
          - filter: "test_bin_bench_*"
            partition: "2/2"
          - filter: "test_lib_bench_*"
            partition: "1/6"
          - filter: "test_lib_bench_*"
            partition: "2/6"
          - filter: "test_lib_bench_*"
            partition: "3/6"
          - filter: "test_lib_bench_*"
            partition: "4/6"
          - filter: "test_lib_bench_*"
            partition: "5/6"
          - filter: "test_lib_bench_*"
            partition: "6/6"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.filter }}_${{ matrix.partition }}
      - name: Build and install valgrind
        run: |
          brew tap LouisBrunner/valgrind
          brew install --HEAD LouisBrunner/valgrind/valgrind
      - name: Run the system tests
        run: just full-bench-test-all --filter='${{ matrix.filter }}' --partition='${{ matrix.partition }}'
        env:
          RUST_BACKTRACE: "0"
      - name: Generate sanitized artifact name
        if: ${{ always() }}
        run: |
          sanitized=$(echo '${{ matrix.filter }}-${{ matrix.partition }}' | tr '*/' '_')
          echo "ARTIFACT_NAME=macos-system-tests-${sanitized}" >> "$GITHUB_ENV"
      - name: Upload gungraun artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: target/gungraun
