name: Valgrind requests checks and tests

on:
  workflow_call:
    inputs:
      cargo_term_color:
        required: false
        type: string
      valgrind_version:
        required: false
        type: string

env:
  CARGO_TERM_COLOR: ${{ inputs.cargo_term_color }}
  VALGRIND_VERSION: ${{ inputs.valgrind_version }}

jobs:
  build:
    name: Build with feature powerset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: "1.85.1" # MSRV
            os: ubuntu-latest
          - toolchain: stable
            os: ubuntu-latest
          - toolchain: nightly
            os: ubuntu-latest
          - toolchain: stable
            os: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          key: ${{ matrix.toolchain }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-hack
      - name: Install valgrind
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Install valgrind
        if: matrix.os == 'macos-14'
        run: |
          brew tap LouisBrunner/valgrind
          brew install --HEAD LouisBrunner/valgrind/valgrind
          echo "VALGRIND_REQUESTS_VALGRIND_INCLUDE=$(brew --prefix)/include" >> "$GITHUB_ENV"
      - name: Update dependencies
        if: matrix.toolchain != '1.85.1'
        run: cargo update
      - name: Build
        run: just build-hack-valgrind-requests

  test_basic:
    name: Run basic unit and integrations tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@just
      - name: Install valgrind
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Update dependencies
        run: cargo update
      - name: Build all tests with the feature powerset
        run: just build-tests-hack-valgrind-requests
      - name: Run the tests
        run: just test valgrind-requests

  test_linux:
    name: Run client request tests on linux targets
    needs: [build, test_basic]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
          - s390x-unknown-linux-gnu
          - powerpc-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
      - uses: taiki-e/install-action@just
      - name: Install valgrind
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Test client requests
        run: just reqs-test ${{ matrix.target }}
        env:
          RUSTUP_TOOLCHAIN: "stable"
          VALGRIND_REQUESTS_STRATEGY: strict
        #   CROSS_DEBUG: "1"

  test_freebsd:
    name: Run client request tests on freebsd targets
    runs-on: ubuntu-latest
    needs: [build, test_basic]
    steps:
      - uses: actions/checkout@v6
      - uses: cross-platform-actions/action@v1
        env:
          VALGRIND_REQUESTS_VALGRIND_INCLUDE: "/usr/local/include"
          VALGRIND_REQUESTS_VALGRIND_PATH: "/usr/local/bin"
          VALGRIND_REQUESTS_STRATEGY: strict
        with:
          environment_variables: VALGRIND_REQUESTS_VALGRIND_INCLUDE VALGRIND_REQUESTS_VALGRIND_PATH CARGO_TERM_COLOR VALGRIND_REQUESTS_STRATEGY
          operating_system: freebsd
          architecture: x86-64
          version: "15.0"
          shell: bash
          memory: 8G
          sync_files: runner-to-vm
          # Our custom freebsd image with increased disk space (15G instead of
          # 12G) and dependencies pre-installed
          image_url: https://github.com/gungraun/freebsd-builder/releases/download/v0.1.2-custom/freebsd-15.0-x86-64.qcow2
          run: |
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain stable --profile minimal -y

            ./scripts/freebsd_print_info.sh

            . ~/.cargo/env
            cargo update
            cargo test -p client-request-tests --test tests --release -- --nocapture

            echo Disk usage
            df -h

  test_macos:
    name: Run client request tests on macos targets
    needs: [build, test_basic]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install valgrind
        run: |
          brew tap LouisBrunner/valgrind
          brew install --HEAD LouisBrunner/valgrind/valgrind
          echo "VALGRIND_REQUESTS_VALGRIND_INCLUDE=$(brew --prefix)/include" >> "$GITHUB_ENV"
      - name: Update dependencies
        run: cargo update
      - name: Test client requests
        run: cargo test -p client-request-tests --test tests --release -- --nocapture
        env:
          VALGRIND_REQUESTS_STRATEGY: strict

  test_illumos:
    name: Run client request tests on omnios/illumos/solaris targets
    runs-on: ubuntu-latest
    needs: [build, test_basic]
    steps:
      - uses: actions/checkout@v6
      - uses: cross-platform-actions/action@v1
        env:
          VALGRIND_REQUESTS_STRATEGY: strict
        with:
          environment_variables: CARGO_TERM_COLOR VALGRIND_REQUESTS_STRATEGY VALGRIND_VERSION
          operating_system: omnios
          architecture: x86-64
          version: "r151056" # lts
          shell: bash
          memory: 8G
          sync_files: runner-to-vm
          run: |
            set -euxo pipefail

            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain stable --profile minimal -y

            sudo pkg install \
              developer/omnios-build-tools \
              ooce/developer/clang-21

            valgrind_version="${VALGRIND_VERSION:-3.27.1}"
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSLO "https://sourceware.org/pub/valgrind/valgrind-${valgrind_version}.tar.bz2"
            tar xjf "valgrind-${valgrind_version}.tar.bz2"

            cd "valgrind-${valgrind_version}"
            /usr/bin/file /bin/sh
            /usr/bin/file -L /bin/sh
            perl -0pi -e 's#/usr/bin/file /bin/sh#/usr/bin/file -L /bin/sh#' configure
            MAKE=gmake ./configure --prefix=/usr --disable-dependency-tracking --enable-tls --enable-only64bit

            gmake -j"$(getconf NPROCESSORS_ONLN)"
            sudo gmake install
            cd ..

            valgrind --version

            . ~/.cargo/env
            cargo update
            cargo test -p client-request-tests --test tests --release -- --nocapture

            echo Disk usage
            df -h
