# spell-checker:ignore taiki rustfmt binstall clippy taplo rustup nocapture
# spell-checker:ignore nofile gnuabi armv gnueabi mipsel vmactions usesh proto
# spell-checker:ignore tlsv connrefused copyback toolsdirectory ghcup rustdocflags
# spell-checker:ignore androideabi binutils

name: Build and Check/Linux

on:
  workflow_call:

jobs:
  build_hack:
    name: Build with feature powerset
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.74.1" # MSRV
          - stable
          - nightly
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Install valgrind
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Update dependencies
        if: matrix.toolchain != '1.74.1'
        run: cargo update
      - name: Build
        run: just build-hack

  test_ui:
    name: Run ui tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.74.1"
          components: rust-src
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - name: Run ui tests
        run: |
          set -o pipefail
          just test-ui |& tee test.output
      - name: Check test output for ui errors
        if: ${{ failure() }}
        run: |
          if grep -q '^test ui \.\.\. FAILED$' test.output; then
            just test-ui-overwrite
            git diff gungraun/tests/ui
          fi
          exit 1

  test:
    name: Run unit and integrations tests
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.74.1" # MSRV
          - stable
          - nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: "Prepare: Run cargo update"
        if: matrix.toolchain != '1.74.1'
        run: |
          cargo update
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Build and install valgrind
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Build all tests with the feature powerset
        run: just build-tests-hack
      - name: Run the tests
        run: cargo test --workspace --exclude client-request-tests

  test_system:
    name: Run system tests
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.74.1" # MSRV
          - stable
          - nightly
        filter:
          - "test_bin_bench_*"
          - "test_lib_bench_*"
        partition:
          - "1/3"
          - "2/3"
          - "3/3"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: "Prepare: Run cargo update"
        if: matrix.toolchain != '1.74.1'
        run: |
          cargo update
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}_${{ matrix.filter }}_${{ matrix.partition }}
      - name: Install valgrind
        run: ./scripts/install_valgrind.sh "$VALGRIND_VERSION"
      - name: Run the system tests with --filter=${{ matrix.filter }}
        run: just args='--filter=${{ matrix.filter }} --partition=${{ matrix.partition }}' full-bench-test-all
        env:
          RUST_BACKTRACE: "0"

  test_client_requests:
    name: Run client request tests
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Test client requests
        run: just reqs-test ${{ matrix.target }}
        env:
          RUSTUP_TOOLCHAIN: "stable"
        #   CROSS_DEBUG: "1"
