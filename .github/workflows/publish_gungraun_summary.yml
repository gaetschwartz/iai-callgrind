name: Deploy gungraun-summary
on:
  push:
    tags:
      - "gungraun-summary-v*"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish gungraun-summary
        run: cargo publish -p gungraun-summary --token ${{ secrets.CRATES_GITHUB_TOKEN }}
