# spell-checker:ignore dorny

name: Build and Check

on:
  push:
    branches: ["main", "cicd", "release", "develop", "[0-9]+-*"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "00 01 * * *"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    name: Shared workflow config
    runs-on: ubuntu-latest
    outputs:
      cargo_term_color: ${{ steps.config.outputs.cargo_term_color }}
      rust_backtrace: ${{ steps.config.outputs.rust_backtrace }}
      valgrind_requests_changed: ${{ steps.filter.outputs.valgrind_requests }}
      valgrind_version: ${{ steps.config.outputs.valgrind_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            valgrind_requests:
              - 'valgrind-requests/**'
      - id: config
        run: |
          {
            echo 'cargo_term_color=always'
            echo 'rust_backtrace=1'
            echo 'valgrind_version=3.27.0'
          } >> "$GITHUB_OUTPUT"

  basic:
    name: Basic checks
    needs: [config]
    uses: ./.github/workflows/basic.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}
      rust_backtrace: ${{ needs.config.outputs.rust_backtrace }}

  common:
    name: Common checks
    needs: [basic, config]
    uses: ./.github/workflows/common.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}
      valgrind_version: ${{ needs.config.outputs.valgrind_version }}

  valgrind_requests:
    name: Valgrind requests checks
    needs: [basic, config]
    if: github.event_name == 'schedule' || needs.config.outputs.valgrind_requests_changed == 'true'
    uses: ./.github/workflows/valgrind_requests.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}
      valgrind_version: ${{ needs.config.outputs.valgrind_version }}

  linux:
    name: Linux checks
    needs: [basic, config]
    uses: ./.github/workflows/linux.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}
      valgrind_version: ${{ needs.config.outputs.valgrind_version }}

  freebsd:
    name: Freebsd checks
    needs: [basic, config]
    uses: ./.github/workflows/freebsd.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}

  macos:
    name: MacOS checks
    needs: [basic, config]
    uses: ./.github/workflows/macos.yml
    with:
      cargo_term_color: ${{ needs.config.outputs.cargo_term_color }}
