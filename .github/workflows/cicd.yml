# spell-checker:ignore taiki rustfmt binstall clippy taplo rustup nocapture
# spell-checker:ignore nofile gnuabi armv gnueabi mipsel vmactions usesh proto
# spell-checker:ignore tlsv connrefused copyback toolsdirectory ghcup

name: Build and Check

on:
  push:
    branches: ["main", "cicd", "release", "develop", "[0-9]+-*"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "00 01 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  deny:
    name: Check dependencies/ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - "--deny warnings advisories"
          - bans licenses sources
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  minimal_versions:
    name: Check minimal version requirements of dependencies
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - nightly
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        if: ${{ startsWith(matrix.toolchain, 'nightly') }}
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: dtolnay/rust-toolchain@master
        if: ${{ ! startsWith(matrix.toolchain, 'nightly') }}
        with:
          toolchain: nightly
      - uses: dtolnay/rust-toolchain@master
        if: ${{ ! startsWith(matrix.toolchain, 'nightly') }}
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-latest_${{ matrix.toolchain }}
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@cargo-minimal-versions
      - uses: taiki-e/install-action@just
      - name: Check build with minimal versions
        run: just minimal-versions

  format:
    name: Check format and spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@taplo
      - run: just check-fmt-all

  base:
    needs: [format]
    name: Build, check and test
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.74.1" # MSRV
          - stable
          - nightly
        include:
          - toolchain: "1.74.1" # MSRV
            ui_tests: --features ui_tests
            components: rust-src
          - toolchain: stable
            components: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: ${{ matrix.components }}
      - name: "Prepare: Install stable toolchain with clippy"
        if: matrix.toolchain != 'stable'
        run: |
          rustup toolchain install stable --no-self-update --component clippy
      - name: "Prepare: Run cargo update"
        if: matrix.toolchain == 'stable' || matrix.toolchain == 'nightly'
        run: |
          cargo update
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@just
      - name: Build and install valgrind
        run: ./scripts/build_and_install_valgrind.sh
      - name: Info
        run: |
          set -x
          uname -a
          pwd
          rustup --version
          rustup show
          rustup component list --installed
          valgrind --version
      - name: Build with the feature powerset
        run: just build-hack
      # Fix github ci error: /usr/bin/ld: final link failed: No space left on device
      - name: Cleanup build artifacts
        run: cargo clean
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Build the tests with the feature powerset
        run: just build-tests-hack
      - name: Lint
        run: just lint
      - name: Test
        run: |
          set -o pipefail
          cargo test --workspace --exclude client-request-tests ${{ matrix.ui_tests }} |& tee test.output
      - name: Check test output for ui errors
        if: ${{ matrix.ui_tests && failure() }}
        run: |
          if grep -q '^test ui \.\.\. FAILED$' test.output; then
            TRYBUILD=overwrite cargo test ${{ matrix.ui_tests }} ui
            git diff gungraun/tests/ui
          fi
          exit 1
      - name: Check summary.json schema is up-to-date
        run: just schema-gen-diff
      - name: Bench
        run: just full-bench-test-all
        env:
          # GUNGRAUN_LOG: trace
          RUST_BACKTRACE: "0"
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: gungraun-benchmarks-${{ matrix.toolchain }}
          path: "target/gungraun"

  client_requests:
    needs: [format]
    name: Test client requests
    strategy:
      fail-fast: false
      matrix:
        job:
          # These are Gungraun optimized targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
    runs-on: ${{ matrix.job.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross_${{ matrix.job.os }}_${{ matrix.job.target }}
      - name: Info
        run: |
          set -x
          uname -a
          pwd
          rustup --version
          rustup show
          rustup component list --installed
      - name: Test client requests
        run: just reqs-test ${{ matrix.job.target }}
        env:
          RUSTUP_TOOLCHAIN: "stable"
        #   CROSS_DEBUG: "1"

  freebsd:
    name: Build, check and test/FreeBSD
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # This job should free around 20 - 30 GB disk space which is needed for
        # the custom freebsd image which requires 30 GB disk space
        # Source: https://www.geraldonit.com/mastering-disk-space-on-github-actions-runners-a-deep-dive-into-cleanup-strategies-for-x64-and-arm64-runners/
      - name: Free disk space
        run: |
          echo Disk usage before
          df -h /

          # Remove unused tool caches
          sudo rm -rf /usr/lib/jvm # Java JDK
          sudo rm -rf /usr/local/.ghcup # Haskell compiler installer
          sudo rm -rf /usr/local/lib/android # Android SDK/NDK
          sudo rm -rf /usr/local/share/powershell # Powershell SDKs
          sudo rm -rf /usr/share/dotnet # .NET runtimes and SDKs
          sudo rm -rf /usr/share/swift # Swift runtime and SDKs
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" # Pre-cached tools (Node, Python, Go, Ruby, .NET SDKs, etc.)

          echo Disk usage after
          df -h /
      - uses: cross-platform-actions/action@v0.32.0
        env:
          GUNGRAUN_VALGRIND_INCLUDE: "/usr/local/include"
          GUNGRAUN_VALGRIND_PATH: "/usr/local/bin"
        with:
          environment_variables: GUNGRAUN_VALGRIND_INCLUDE GUNGRAUN_VALGRIND_PATH
          operating_system: freebsd
          architecture: x86-64
          version: "15.0"
          shell: bash
          memory: 10G
          sync_files: runner-to-vm
          # Our custom freebsd image with increased disk space (30G instead of
          # 12G) and dependencies pre-installed
          image_url: https://github.com/gungraun/freebsd-builder/releases/download/v0.1.1-custom/freebsd-15.0-x86-64.qcow2
          run: |
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain stable --profile minimal -y
            ./scripts/freebsd_print_info.sh
            ./scripts/freebsd_build_and_test.sh
            echo Disk usage
            df -h
      # Set `copyback` to `true` and enable for debugging.
      # - name: Upload target/gungraun
      #   if: ${{ always() }}
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: freebsd-target-gungraun
      #     path: target/gungraun

  docs:
    needs: [base, client_requests]
    name: Docs/ubuntu-latest
    runs-on: ubuntu-latest
    env:
      DOCS_RS: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build gungraun without valgrind headers
        run: cargo build --package gungraun --features client_requests_defs --release
      - name: Run doc tests
        run: cargo test --all-features --doc
      - name: Check Documentation
        run: cargo doc --all-features --no-deps --document-private-items
